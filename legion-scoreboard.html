<!-- Скрипт очистки артефактов -->
<script>
(function() {
  const body = document.body;
  const childNodes = body.childNodes;
  for (let i = childNodes.length - 1; i >= 0; i--) {
    const node = childNodes[i];
    if (node.nodeType === Node.TEXT_NODE && node.textContent.trim() !== '') {
      node.remove();
    }
  }
})();
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAFb-yJaI7WJFcTx_wAFmSngupHqUNai1I",
  authDomain: "scoreboard-6d34c.firebaseapp.com",
  databaseURL: "https://scoreboard-6d34c-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "scoreboard-6d34c",
  storageBucket: "scoreboard-6d34c.firebasestorage.app",
  messagingSenderId: "11785107743",
  appId: "1:11785107743:web:a8faa98d6aaf4462dd582a"
};

const LEGION_LOGO = "https://raw.githubusercontent.com/e-lis777/scoreboard/213ce1bfda11bdec1bc83000326fcc9d9e350d33/data/legion-logo.svg";
const PLAYERS_JSON_URL = "https://raw.githubusercontent.com/e-lis777/scoreboard/c2b7d591ff4a076125c01bf35a807eeb05a1a84b/data/players.json";
const DEFAULT_OPPONENT_LOGO = "https://static.vecteezy.com/system/resources/thumbnails/035/225/612/small_2x/ai-generated-soccer-ball-on-transparent-background-free-png.png";
const DB_KEY = 'legion_match_v1';
const ADMIN = new URLSearchParams(window.location.search).get('admin') === 'true';

const VERSION = "2.5.1"; // увеличиваем версию

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let state = {
  opponentName: 'СОПЕРНИК',
  opponentLogo: '',
  legionScore: 0,
  opponentScore: 0,
  timer: {
    running: false,
    startTime: 0,
    elapsed: 0
  },
  period: '1 ТАЙМ',
  designVariant: 3,
  colorTheme: 'green',
  logoAnimEnabled: true
};

let currentTimerSeconds = 0;
let timerInterval = null;

let players = [];

const elements = {
  v1: { lh: document.getElementById('v1-lh'), la: document.getElementById('v1-la'), nh: document.getElementById('v1-nh'), na: document.getElementById('v1-na'), sh: document.getElementById('v1-sh'), sa: document.getElementById('v1-sa'), p: document.getElementById('v1-p'), t: document.getElementById('v1-t') },
  v2: { lh: document.getElementById('v2-lh'), la: document.getElementById('v2-la'), nh: document.getElementById('v2-nh'), na: document.getElementById('v2-na'), sh: document.getElementById('v2-sh'), sa: document.getElementById('v2-sa'), p: document.getElementById('v2-p'), t: document.getElementById('v2-t') },
  v3: { lh: document.getElementById('v3-lh'), la: document.getElementById('v3-la'), nh: document.getElementById('v3-nh'), na: document.getElementById('v3-na'), sh: document.getElementById('v3-sh'), sa: document.getElementById('v3-sa'), p: document.getElementById('v3-p'), t: document.getElementById('v3-t') },
  admin: {
    na: document.getElementById('adm-na'),
    la: document.getElementById('adm-la'),
    sh: document.getElementById('adm-sh'),
    sa: document.getElementById('adm-sa'),
    p: document.getElementById('adm-p'),
    animChk: document.getElementById('anim-chk'),
    varBtns: document.querySelectorAll('.var-btn'),
    colBtns: document.querySelectorAll('.col-btn'),
    tmInd: document.getElementById('tm-ind'),
    tmTxt: document.getElementById('tm-txt')
  },
  sbV1: document.getElementById('sb-v1'),
  sbV2: document.getElementById('sb-v2'),
  sbV3: document.getElementById('sb-v3'),
  goalAnim: document.getElementById('goal-anim'),
  logoAnim: document.getElementById('logo-anim'),
  toast: document.getElementById('toast'),
  goalCard: document.getElementById('goal-card'),
  goalCardLogo: document.getElementById('goal-card-logo'),
  goalLastname: document.getElementById('goal-lastname'),
  goalNumber: document.getElementById('goal-number'),
  goalPosition: document.getElementById('goal-position'),
  goalMinuteDisplay: document.getElementById('goal-minute-display'),
  goalModal: document.getElementById('goal-modal'),
  scorerButtons: document.getElementById('scorer-buttons'),
  versionDisplay: document.getElementById('version-display')
};

if (elements.versionDisplay) {
  elements.versionDisplay.textContent = `v${VERSION}`;
}

async function loadPlayers() {
  try {
    const response = await fetch(PLAYERS_JSON_URL);
    if (!response.ok) throw new Error('Ошибка загрузки players.json');
    players = await response.json();
    const positionOrder = { 'ЛН':1, 'ЦН':2, 'ПН':3, 'ПЗ':4, 'ЦП':5, 'ЛЗ':6, 'ЦЗ':7, 'ГК':8 };
    players.sort((a, b) => {
      const orderA = positionOrder[a.position] || 99;
      const orderB = positionOrder[b.position] || 99;
      if (orderA !== orderB) return orderA - orderB;
      return a.number - b.number;
    });
    console.log('Игроки загружены:', players);
  } catch (e) {
    console.error('Не удалось загрузить игроков:', e);
  }
}

function openGoalModal() {
  if (!players.length) {
    toast('Список игроков не загружен');
    return;
  }
  if (!elements.goalModal.classList.contains('hidden')) return;
  elements.goalModal.classList.remove('hidden');
}

function selectScorerAndGoal(player) {
  state.legionScore++;
  elements.admin.sh.value = state.legionScore;
  update(ref(db, DB_KEY), { legionScore: state.legionScore }).catch(console.error);
  
  const animData = { time: Date.now(), team: 'legion' };
  set(ref(db, 'goal_trigger'), animData).catch(console.error);
  
  setTimeout(() => {
    const goalData = {
      team: 'legion',
      scorer: {
        lastName: player.lastName,
        number: player.number,
        position: player.position
      },
      minute: Math.floor(currentTimerSeconds / 60),
      timestamp: Date.now()
    };
    set(ref(db, 'live_goal'), goalData)
      .then(() => setTimeout(() => set(ref(db, 'live_goal'), null), 8000))
      .catch(console.error);
  }, 2000);
  
  elements.goalModal.classList.add('hidden');
  toast('⚽ Гол!');
}

function goalWithoutPlayerFromModal() {
  state.legionScore++;
  elements.admin.sh.value = state.legionScore;
  update(ref(db, DB_KEY), { legionScore: state.legionScore }).catch(console.error);
  
  const animData = { time: Date.now(), team: 'legion' };
  set(ref(db, 'goal_trigger'), animData).catch(console.error);
  
  elements.goalModal.classList.add('hidden');
  toast('⚽ Гол!');
}

function renderPlayerButtons() {
  if (!elements.scorerButtons) return;
  elements.scorerButtons.innerHTML = '';
  players.forEach(player => {
    const btn = document.createElement('button');
    btn.className = 'player-btn';
    btn.innerHTML = `
      <span class="player-number-badge">${player.number}</span>
      <span>${player.shortName}</span>
    `;
    btn.addEventListener('click', () => selectScorerAndGoal(player));
    elements.scorerButtons.appendChild(btn);
  });
}

const dataRef = ref(db, DB_KEY);
onValue(dataRef, (snapshot) => {
  const data = snapshot.val();
  if (!data) return;
  
  // Конвертация старого формата
  if (data.timer === undefined && data.timerSeconds !== undefined) {
    state.timer = {
      running: data.timerRunning || false,
      startTime: data.timerRunning ? Date.now() - (data.timerSeconds * 1000) : 0,
      elapsed: data.timerRunning ? 0 : (data.timerSeconds || 0)
    };
  } else {
    state.timer = data.timer || { running: false, startTime: 0, elapsed: 0 };
  }

  // Защита от отрицательного elapsed
  if (state.timer.elapsed < 0) state.timer.elapsed = 0;

  // Защита от startTime в будущем
  const now = Date.now();
  if (state.timer.running && state.timer.startTime > now) {
    console.warn('Обнаружен startTime в будущем, сбрасываем таймер');
    state.timer.running = false;
    state.timer.startTime = 0;
    state.timer.elapsed = 0;
  }

  state.opponentName = data.opponentName || 'СОПЕРНИК';
  state.opponentLogo = data.opponentLogo || '';
  state.legionScore = data.legionScore || 0;
  state.opponentScore = data.opponentScore || 0;
  state.period = data.period || '1 ТАЙМ';
  state.designVariant = data.designVariant || 3;
  state.colorTheme = data.colorTheme || 'green';
  state.logoAnimEnabled = data.logoAnimEnabled !== undefined ? data.logoAnimEnabled : true;
  
  updateCurrentTimerSeconds();
  
  if (!ADMIN) {
    updateAllVariants();
    updateVisibility();
    applyColorTheme();
    updateAnimCheckbox();
    if (state.timer.running && !timerInterval) {
      startTimerInterval();
    } else if (!state.timer.running && timerInterval) {
      stopTimerInterval();
    }
  } else {
    updateAdminPanel();
  }
});

function updateCurrentTimerSeconds() {
  let seconds;
  if (state.timer.running && state.timer.startTime > 0) {
    seconds = state.timer.elapsed + (Date.now() - state.timer.startTime) / 1000;
  } else {
    seconds = state.timer.elapsed;
  }
  // Защита от отрицательного времени
  currentTimerSeconds = Math.max(0, Math.floor(seconds));
  updateTimerDisplay();
}

function startTimerInterval() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (state.timer.running) {
      updateCurrentTimerSeconds();
    }
  }, 1000);
}

function stopTimerInterval() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
}

set(ref(db, 'goal_trigger'), null).catch(() => {});
set(ref(db, 'live_goal'), null).catch(() => {});

onValue(ref(db, 'goal_trigger'), (snapshot) => {
  const trigger = snapshot.val();
  if (!trigger || ADMIN) return;
  const now = Date.now();
  if (trigger.time && now - trigger.time > 10000) return;
  elements.goalAnim.classList.add('active');
  setTimeout(() => elements.goalAnim.classList.remove('active'), 1500);
  if (trigger.team === 'legion' && state.logoAnimEnabled) {
    elements.logoAnim.classList.remove('active');
    setTimeout(() => elements.logoAnim.classList.add('active'), 50);
    setTimeout(() => elements.logoAnim.classList.remove('active'), 1600);
  }
});

onValue(ref(db, 'live_goal'), (snapshot) => {
  const goal = snapshot.val();
  if (!goal || ADMIN) return;
  const now = Date.now();
  if (goal.timestamp && now - goal.timestamp > 10000) return;
  showGoalCard(goal);
});

function showGoalCard(goal) {
  if (!goal || goal.team !== 'legion') return;
  elements.goalLastname.textContent = goal.scorer.lastName.toUpperCase();
  elements.goalNumber.textContent = goal.scorer.number;
  
  if (goal.scorer.position) {
    elements.goalPosition.textContent = goal.scorer.position;
    elements.goalPosition.style.display = 'inline-block';
  } else {
    elements.goalPosition.style.display = 'none';
  }
  
  elements.goalMinuteDisplay.textContent = `${goal.minute}'`;
  elements.goalCard.classList.remove('hidden');
  setTimeout(() => elements.goalCard.classList.add('show'), 10);
  if (window.goalCardTimeout) clearTimeout(window.goalCardTimeout);
  window.goalCardTimeout = setTimeout(() => {
    elements.goalCard.classList.remove('show');
    setTimeout(() => elements.goalCard.classList.add('hidden'), 400);
  }, 5000);
}

function updateAllVariants() {
  const opponentLogoSrc = state.opponentLogo || DEFAULT_OPPONENT_LOGO;
  ['v1', 'v2', 'v3'].forEach(v => {
    elements[v].lh.src = LEGION_LOGO;
    elements[v].la.src = opponentLogoSrc;
    elements[v].nh.textContent = 'ЛЕГИОН';
    elements[v].na.textContent = state.opponentName;
    elements[v].sh.textContent = state.legionScore;
    elements[v].sa.textContent = state.opponentScore;
    elements[v].p.textContent = state.period;
  });
  if (state.opponentLogo === '') {
    elements.v1.la.classList.add('away');
    elements.v2.la.classList.add('away');
  } else {
    elements.v1.la.classList.remove('away');
    elements.v2.la.classList.remove('away');
  }
  if (state.opponentLogo === '') {
    elements.v3.la.classList.add('default-logo');
  } else {
    elements.v3.la.classList.remove('default-logo');
  }
  updateTimerDisplay();
  updateV3Width();
}

function updateV3Width() {
  const maxLen = Math.max(7, state.opponentName.length);
  const stripWidth = Math.min(Math.max(maxLen * 13 + 30, 140), 220);
  elements.sbV3.style.setProperty('--strip-width', stripWidth + 'px');
}

function updateTimerDisplay() {
  const timeStr = formatTime(currentTimerSeconds);
  elements.v1.t.textContent = timeStr;
  elements.v2.t.textContent = timeStr;
  elements.v3.t.textContent = timeStr;
  
  const paused = !state.timer.running;
  elements.v1.t.classList.toggle('paused', paused);
  elements.v2.t.classList.toggle('paused', paused);
  elements.v3.t.classList.toggle('paused', paused);
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function updateVisibility() {
  elements.sbV1.classList.toggle('hide', state.designVariant !== 1);
  elements.sbV2.classList.toggle('hide', state.designVariant !== 2);
  elements.sbV3.classList.toggle('hide', state.designVariant !== 3);
}

function applyColorTheme() {
  document.body.classList.forEach(cls => {
    if (cls.startsWith('theme-')) document.body.classList.remove(cls);
  });
  document.body.classList.add('theme-' + state.colorTheme);
  elements.sbV3.className = elements.sbV3.className.replace(/theme-\w+/, '').trim();
  elements.sbV3.classList.add('theme-' + state.colorTheme);
}

function updateAdminPanel() {
  elements.admin.na.value = state.opponentName;
  elements.admin.la.value = state.opponentLogo;
  elements.admin.sh.value = state.legionScore;
  elements.admin.sa.value = state.opponentScore;
  elements.admin.p.value = state.period;
  elements.admin.animChk.checked = state.logoAnimEnabled;
  elements.admin.varBtns.forEach((btn, i) => {
    btn.classList.toggle('act', i + 1 === state.designVariant);
  });
  elements.admin.colBtns.forEach(btn => {
    btn.classList.toggle('act', btn.dataset.color === state.colorTheme);
  });
  if (state.timer.running) {
    elements.admin.tmInd.classList.add('run');
    elements.admin.tmTxt.textContent = 'Запущен';
  } else {
    elements.admin.tmInd.classList.remove('run');
    elements.admin.tmTxt.textContent = 'Остановлен';
  }
}

function updateAnimCheckbox() {
  if (elements.admin.animChk) {
    elements.admin.animChk.checked = state.logoAnimEnabled;
  }
}

function validateImageUrl(url, callback) {
  const img = new Image();
  img.onload = () => callback(true);
  img.onerror = () => callback(false);
  img.src = url;
}

function setVariant(variant) {
  if (state.designVariant === variant) return;
  state.designVariant = variant;
  update(ref(db, DB_KEY), { designVariant: variant }).catch(console.error);
  toast('Вариант изменён');
}

function setColor(color) {
  if (state.colorTheme === color) return;
  state.colorTheme = color;
  update(ref(db, DB_KEY), { colorTheme: color }).catch(console.error);
  toast('Тема изменена');
}

function toggleAnim() {
  state.logoAnimEnabled = elements.admin.animChk.checked;
  update(ref(db, DB_KEY), { logoAnimEnabled: state.logoAnimEnabled }).catch(console.error);
  toast('Анимация лого ' + (state.logoAnimEnabled ? 'включена' : 'выключена'));
}

function saveOpponent() {
  const newName = elements.admin.na.value || 'СОПЕРНИК';
  const newLogo = elements.admin.la.value;
  
  if (newLogo) {
    validateImageUrl(newLogo, (valid) => {
      if (!valid) {
        toast('Неверный URL логотипа, сохранение отменено');
        return;
      }
      state.opponentName = newName;
      state.opponentLogo = newLogo;
      update(ref(db, DB_KEY), { opponentName: newName, opponentLogo: newLogo }).catch(console.error);
      toast('Соперник сохранён');
    });
  } else {
    state.opponentName = newName;
    state.opponentLogo = '';
    update(ref(db, DB_KEY), { opponentName: newName, opponentLogo: '' }).catch(console.error);
    toast('Соперник сохранён');
  }
}

function updateScore() {
  state.legionScore = Math.max(0, parseInt(elements.admin.sh.value) || 0);
  state.opponentScore = Math.max(0, parseInt(elements.admin.sa.value) || 0);
  elements.admin.sh.value = state.legionScore;
  elements.admin.sa.value = state.opponentScore;
  update(ref(db, DB_KEY), { legionScore: state.legionScore, opponentScore: state.opponentScore }).catch(console.error);
  toast('Счёт обновлён');
}

function resetScore() {
  state.legionScore = 0;
  state.opponentScore = 0;
  elements.admin.sh.value = 0;
  elements.admin.sa.value = 0;
  update(ref(db, DB_KEY), { legionScore: 0, opponentScore: 0 }).catch(console.error);
  toast('Счёт сброшен');
}

function triggerGoal(team = null) {
  const goalData = { time: Date.now(), team: team };
  set(ref(db, 'goal_trigger'), goalData)
    .then(() => setTimeout(() => set(ref(db, 'goal_trigger'), null), 2000))
    .catch(console.error);
}

function quickGoal(team) {
  if (team === 'legion') {
    openGoalModal();
  } else {
    state.opponentScore++;
    elements.admin.sa.value = state.opponentScore;
    update(ref(db, DB_KEY), { opponentScore: state.opponentScore }).catch(console.error);
    triggerGoal(team);
    toast('Гол соперника');
  }
}

function timerPause() {
  if (!state.timer.running) return;
  
  const now = Date.now();
  const additional = (now - state.timer.startTime) / 1000;
  const newElapsed = Math.max(0, state.timer.elapsed + additional);
  
  const newTimer = {
    running: false,
    startTime: 0,
    elapsed: newElapsed
  };
  
  update(ref(db, DB_KEY), { timer: newTimer }).catch(console.error);
  toast('Таймер остановлен');
}

function timerStart() {
  if (state.timer.running) return;
  
  const now = Date.now();
  const newTimer = {
    running: true,
    startTime: now,
    elapsed: Math.max(0, state.timer.elapsed)
  };
  
  update(ref(db, DB_KEY), { timer: newTimer }).catch(console.error);
  toast('Таймер запущен');
}

function timerReset() {
  const newTimer = {
    running: false,
    startTime: 0,
    elapsed: 0
  };
  
  update(ref(db, DB_KEY), { timer: newTimer }).catch(console.error);
  toast('Таймер сброшен');
}

function updatePeriod() {
  state.period = elements.admin.p.value;
  if (state.period === 'ПЕРЕРЫВ' && state.timer.running) {
    timerPause();
  }
  update(ref(db, DB_KEY), { period: state.period }).catch(console.error);
  toast('Период обновлён');
}

function toast(msg) {
  if (typeof msg === 'string') {
    elements.toast.textContent = msg;
  }
  elements.toast.classList.add('show');
  setTimeout(() => elements.toast.classList.remove('show'), 2000);
}

if (ADMIN) {
  elements.sbV1.classList.add('hide');
  elements.sbV2.classList.add('hide');
  elements.sbV3.classList.add('hide');
  document.getElementById('admin').classList.remove('hide');
  loadPlayers().then(() => renderPlayerButtons());
  document.querySelectorAll('.var-btn').forEach(btn => {
    btn.addEventListener('click', () => setVariant(parseInt(btn.dataset.variant)));
  });
  document.querySelectorAll('.col-btn').forEach(btn => {
    btn.addEventListener('click', () => setColor(btn.dataset.color));
  });
  document.getElementById('anim-chk').addEventListener('change', toggleAnim);
  document.getElementById('saveOpponentBtn').addEventListener('click', saveOpponent);
  document.getElementById('updateScoreBtn').addEventListener('click', updateScore);
  document.getElementById('resetScoreBtn').addEventListener('click', resetScore);
  document.getElementById('timerStartBtn').addEventListener('click', timerStart);
  document.getElementById('timerPauseBtn').addEventListener('click', timerPause);
  document.getElementById('timerResetBtn').addEventListener('click', timerReset);
  document.getElementById('updatePeriodBtn').addEventListener('click', updatePeriod);
  document.getElementById('goalLegionBtn').addEventListener('click', () => quickGoal('legion'));
  document.getElementById('goalOpponentBtn').addEventListener('click', () => quickGoal('opponent'));
  elements.goalModal.addEventListener('click', (e) => {
    if (e.target === elements.goalModal) {
      elements.goalModal.classList.add('hidden');
    }
  });
  updateAdminPanel();
} else {
  elements.goalAnim.classList.remove('active');
  elements.logoAnim.classList.remove('active');
  elements.goalCard.classList.add('hidden');
  updateAllVariants();
  updateVisibility();
  applyColorTheme();
  if (state.timer.running) {
    startTimerInterval();
  }
}

window.goalWithoutPlayerFromModal = goalWithoutPlayerFromModal;
</script>
<!-- Дополнительный скрипт для финальной очистки -->
<script>
(function finalCleanup() {
  document.addEventListener('DOMContentLoaded', function() {
    const body = document.body;
    const walker = document.createTreeWalker(body, NodeFilter.SHOW_TEXT, {
      acceptNode: function(node) {
        if (node.parentNode === body && node.textContent.trim() !== '') {
          return NodeFilter.FILTER_ACCEPT;
        }
        return NodeFilter.FILTER_SKIP;
      }
    });
    while (walker.nextNode()) {
      walker.currentNode.remove();
    }
  });
})();
</script>
