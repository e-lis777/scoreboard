<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Scoreboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Arial Black', Arial, sans-serif; background: transparent; overflow: hidden; user-select: none; }
  
  /* === VARIANT 1: NEW ALIGNMENT === */
  .scoreboard-v1 { display: flex; align-items: center; width: 100%; max-width: 500px; margin: 0 auto; }
  .scoreboard-v1 .main-bar { display: flex; align-items: center; width: 100%; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); border-radius: 10px; padding: 10px 0; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6); }
  .scoreboard-v1 .half { display: flex; flex-direction: column; align-items: center; flex: 1; padding: 0 15px; }
  .scoreboard-v1 .half.home { border-right: 1px solid rgba(255,255,255,0.1); }
  .scoreboard-v1 .logo { width: 45px; height: 45px; object-fit: contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
  .scoreboard-v1 .team-name { font-size: 12px; font-weight: 900; color: #fff; text-transform: uppercase; text-align: center; text-shadow: 0 2px 4px rgba(0,0,0,0.8); white-space: nowrap; margin-top: 4px; max-width: 120px; overflow: hidden; text-overflow: ellipsis; }
  .scoreboard-v1 .score-section { display: flex; flex-direction: column; align-items: center; padding: 0 20px; }
  .scoreboard-v1 .scores { display: flex; align-items: center; gap: 10px; }
  .scoreboard-v1 .score { font-size: 40px; font-weight: 900; color: #fff; text-shadow: 0 0 15px rgba(0, 150, 255, 0.6); min-width: 40px; text-align: center; line-height: 1; }
  .scoreboard-v1 .score-separator { font-size: 28px; color: rgba(255,255,255,0.4); }
  .scoreboard-v1 .timer-bar { display: flex; align-items: center; gap: 8px; background: linear-gradient(180deg, #ff4757 0%, #cc3344 100%); padding: 4px 10px; border-radius: 6px; margin-top: 6px; white-space: nowrap; }
  .scoreboard-v1 .period-badge { font-size: 9px; font-weight: 900; color: #fff; text-transform: uppercase; padding: 2px 6px; background: rgba(0,0,0,0.3); border-radius: 4px; }
  .scoreboard-v1 .timer { font-size: 13px; font-weight: 900; color: #ffcc00; font-variant-numeric: tabular-nums; }
  .scoreboard-v1 .timer.paused { animation: pulse 1s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

  /* === VARIANT 2: TV STYLE (ОРИГИНАЛЬНЫЙ) === */
  .scoreboard-v2 { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 550px; margin: 0 auto; }
  .scoreboard-v2 .main-bar { display: flex; align-items: center; width: 100%; transform: skewX(-10deg); border-radius: 6px; box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5); }
  .scoreboard-v2 .v2-team-section { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 15px; flex: 1; background: linear-gradient(90deg, #1a1a1a 0%, #2d2d2d 100%); }
  .scoreboard-v2 .v2-team-section.v2-home { border-right: 1px solid rgba(255,255,255,0.1); }
  .scoreboard-v2 .v2-team-section.v2-away { border-left: 1px solid rgba(255,255,255,0.1); background: linear-gradient(90deg, #2d2d2d 0%, #1a1a1a 100%); }
  .scoreboard-v2 .v2-score-section { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 6px 20px; background: linear-gradient(180deg, #1e5799 0%, #2989d8 50%, #207cca 100%); min-width: 90px; }
  .scoreboard-v2 .v2-team-name { font-size: 14px; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 0.5px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); white-space: nowrap; transform: skewX(10deg); }
  .scoreboard-v2 .v2-logo { width: 34px; height: 34px; object-fit: contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); transform: skewX(10deg); }
  .scoreboard-v2 .v2-scores { display: flex; align-items: center; gap: 8px; }
  .scoreboard-v2 .v2-score { font-size: 32px; font-weight: 900; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
  .scoreboard-v2 .v2-score-separator { font-size: 20px; color: rgba(255,255,255,0.7); }
  .scoreboard-v2 .timer-bar { display: flex; align-items: center; justify-content: center; gap: 12px; background: rgba(0,0,0,0.8); padding: 3px 15px; margin-top: -8px; border-radius: 0 0 6px 6px; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
  .scoreboard-v2 .timer-bar .time { font-size: 12px; font-weight: 700; color: #fff; font-variant-numeric: tabular-nums; }
  .scoreboard-v2 .timer-bar .period { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.7); text-transform: uppercase; padding: 1px 6px; background: rgba(255,255,255,0.1); border-radius: 3px; }

  /* === VARIANT 3: LAYERED STYLE (ОРИГИНАЛЬНЫЙ) === */
  .scoreboard-v3 { position: relative; width: 100%; max-width: 550px; height: 70px; margin: 0 auto; display: flex; align-items: center; justify-content: center; }
  .scoreboard-v3 .v3-logo-home { position: absolute; left: -35px; width: 65px; height: 65px; object-fit: contain; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.6)); z-index: 10; }
  .scoreboard-v3 .v3-logo-away { position: absolute; right: -35px; width: 65px; height: 65px; object-fit: contain; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.6)); z-index: 10; }
  .scoreboard-v3 .dark-bar { position: absolute; left: 25px; right: 25px; height: 50px; background: linear-gradient(90deg, #1b5e20 0%, #2e7d32 100%); z-index: 1; border-radius: 4px; }
  .scoreboard-v3 .v3-team-name { position: absolute; font-size: 15px; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); white-space: nowrap; z-index: 2; padding: 0 15px; max-width: 140px; overflow: hidden; text-overflow: ellipsis; }
  .scoreboard-v3 .v3-team-name.home { left: 30px; }
  .scoreboard-v3 .v3-team-name.away { right: 30px; }
  .scoreboard-v3 .center-box { position: absolute; left: 50%; transform: translateX(-50%); width: 200px; height: 65px; background: linear-gradient(180deg, #f8f8f8 0%, #ffffff 50%, #e8e8e8 100%); border-radius: 12px; z-index: 5; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.8); }
  .scoreboard-v3 .v3-scores { display: flex; align-items: center; gap: 10px; z-index: 6; margin-bottom: 3px; }
  .scoreboard-v3 .v3-score { font-size: 40px; font-weight: 900; color: #000; text-shadow: 0 1px 2px rgba(255,255,255,0.8); min-width: 40px; text-align: center; line-height: 1; }
  .scoreboard-v3 .v3-score-separator { font-size: 26px; color: #555; font-weight: 900; }
  .scoreboard-v3 .timer-section { display: flex; align-items: center; gap: 8px; z-index: 6; white-space: nowrap; }
  .scoreboard-v3 .timer-section .time { font-size: 13px; font-weight: 900; color: #555; font-variant-numeric: tabular-nums; }
  .scoreboard-v3 .timer-section .period { font-size: 10px; font-weight: 900; color: #666; text-transform: uppercase; }

  .v3-theme-blue .dark-bar { background: linear-gradient(90deg, #0a1f44 0%, #163675 100%); }
  .v3-theme-orange .dark-bar { background: linear-gradient(90deg, #c2410c 0%, #ea580c 100%); }
  .v3-theme-purple .dark-bar { background: linear-gradient(90deg, #581c87 0%, #7e22ce 100%); }
  .v3-theme-silver .dark-bar { background: linear-gradient(90deg, #404040 0%, #525252 100%); }
  .v3-theme-red .dark-bar { background: linear-gradient(90deg, #991b1b 0%, #dc2626 100%); }
  .v3-theme-green .dark-bar { background: linear-gradient(90deg, #1b5e20 0%, #2e7d32 100%); }

  /* === ANIMATIONS === */
  .goal-animation { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 100px; font-weight: 900; color: #ffd700; text-shadow: 0 0 30px rgba(255, 215, 0, 0.8); z-index: 1000; pointer-events: none; }
  .goal-animation.animate { animation: goalPop 1.5s ease-out; }
  @keyframes goalPop { 0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 0; } }

  .logo-goal-anim { position: fixed; bottom: -200px; left: -200px; width: 150px; height: 150px; z-index: 1001; pointer-events: none; filter: drop-shadow(0 0 30px rgba(0, 150, 255, 0.8)); opacity: 0; }
  .logo-goal-anim.animate { animation: logoFlyHuge 1.5s forwards; }
  @keyframes logoFlyHuge { 0% { bottom: -200px; left: -200px; transform: scale(0.1) rotate(-15deg); opacity: 0; } 30% { opacity: 1; } 100% { bottom: 50%; left: 50%; transform: translate(-50%, -50%) scale(15) rotate(-25deg); opacity: 0; } }

  /* === ADMIN PANEL === */
  .admin-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 15px; overflow-y: auto; z-index: 2000; color: #fff; }
  .admin-header { text-align: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .admin-header h1 { color: #00d4ff; font-size: 24px; text-transform: uppercase; margin-bottom: 5px; }
  .admin-header p { color: rgba(255,255,255,0.5); font-size: 12px; }
  .admin-grid { display: flex; flex-direction: column; gap: 15px; max-width: 500px; margin: 0 auto; }
  .admin-card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); }
  .admin-card h3 { color: #00d4ff; font-size: 16px; margin-bottom: 15px; text-transform: uppercase; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; color: rgba(255,255,255,0.7); font-size: 12px; margin-bottom: 6px; text-transform: uppercase; }
  .form-group input, .form-group select { width: 100%; padding: 14px 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: #fff; font-size: 16px; }
  .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn { padding: 14px 16px; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; text-transform: uppercase; cursor: pointer; flex: 1; min-width: 70px; color: #fff; }
  .btn-primary { background: linear-gradient(135deg, #00d4ff, #0099cc); }
  .btn-success { background: linear-gradient(135deg, #2ed573, #1ea65a); }
  .btn-warning { background: linear-gradient(135deg, #ffa502, #cc8400); }
  .btn-danger { background: linear-gradient(135deg, #ff4757, #cc3344); }
  .score-inputs { display: flex; gap: 10px; align-items: center; }
  .score-inputs input { width: 65px; text-align: center; font-size: 26px; font-weight: 900; padding: 8px; }
  .hidden { display: none; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: linear-gradient(135deg, #2ed573, #1ea65a); color: #fff; padding: 12px 25px; border-radius: 10px; font-weight: 700; opacity: 0; transition: all 0.3s; z-index: 3000; }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .variant-selector { display: flex; gap: 8px; margin-bottom: 15px; }
  .variant-btn { flex: 1; padding: 12px 8px; border: 2px solid rgba(255,255,255,0.2); border-radius: 8px; background: rgba(0,0,0,0.3); color: #fff; font-weight: 700; cursor: pointer; font-size: 11px; }
  .variant-btn.active { border-color: #00d4ff; background: rgba(0, 212, 255, 0.2); }
  .variant-btn small { display: block; font-size: 9px; opacity: 0.7; margin-top: 3px; font-weight: 400; }
  .color-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 12px; }
  .color-btn { padding: 10px 5px; border: 2px solid rgba(255,255,255,0.2); border-radius: 6px; cursor: pointer; font-weight: 700; color: #fff; text-transform: uppercase; font-size: 9px; }
  .color-btn.active { border-color: #fff; transform: scale(1.05); }
  .color-blue { background: linear-gradient(135deg, #1e3c72, #2a5298); }
  .color-orange { background: linear-gradient(135deg, #d35400, #e67e22); }
  .color-purple { background: linear-gradient(135deg, #4a148c, #7b1fa2); }
  .color-silver { background: linear-gradient(135deg, #424242, #616161); }
  .color-red { background: linear-gradient(135deg, #8b0000, #c41e3a); }
  .color-green { background: linear-gradient(135deg, #1b5e20, #2e7d32); }
  .checkbox-group { display: flex; align-items: center; gap: 10px; padding: 12px; background: rgba(0,0,0,0.2); border-radius: 8px; margin-bottom: 12px; cursor: pointer; }
  .checkbox-group input[type="checkbox"] { width: 18px; height: 18px; accent-color: #00d4ff; }
  .checkbox-group label { margin: 0; font-size: 12px; cursor: pointer; flex: 1; }
  .timer-status { display: flex; align-items: center; gap: 10px; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 8px; margin-bottom: 12px; }
  .timer-status .indicator { width: 10px; height: 10px; border-radius: 50%; background: #ffa502; }
  .timer-status .indicator.running { background: #2ed573; box-shadow: 0 0 8px #2ed573; animation: pulse 1s infinite; }
  .timer-status .text { font-size: 12px; color: rgba(255,255,255,0.8); flex: 1; }
  @media (min-width: 768px) {
    .admin-panel { padding: 30px; }
    .admin-header h1 { font-size: 28px; }
    .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1100px; }
    .admin-card { padding: 22px; }
  }
</style>
</head>
<body>

  <!-- VARIANT 1 -->
  <div id="scoreboard-v1" class="scoreboard-v1">
    <div class="main-bar">
      <div class="half home">
        <img id="logo-home-v1" class="logo" src="" alt="">
        <span id="name-home-v1" class="team-name">ДОМ</span>
      </div>
      <div class="score-section">
        <div class="scores">
          <span id="score-home-v1" class="score">0</span>
          <span class="score-separator">-</span>
          <span id="score-away-v1" class="score">0</span>
        </div>
        <div class="timer-bar">
          <span id="period-badge-v1" class="period-badge">1 ТАЙМ</span>
          <span id="timer-v1" class="timer">00:00</span>
        </div>
      </div>
      <div class="half away">
        <img id="logo-away-v1" class="logo" src="" alt="">
        <span id="name-away-v1" class="team-name">ГОСТИ</span>
      </div>
    </div>
  </div>

  <!-- VARIANT 2: TV STYLE -->
  <div id="scoreboard-v2" class="scoreboard-v2 hidden">
    <div class="main-bar">
      <div class="v2-team-section v2-home">
        <img id="logo-home-v2" class="v2-logo" src="" alt="">
        <span id="name-home-v2" class="v2-team-name">ДОМ</span>
      </div>
      <div class="v2-score-section">
        <div class="v2-scores">
          <span id="score-home-v2" class="v2-score">0</span>
          <span class="v2-score-separator">-</span>
          <span id="score-away-v2" class="v2-score">0</span>
        </div>
      </div>
      <div class="v2-team-section v2-away">
        <span id="name-away-v2" class="v2-team-name">ГОСТИ</span>
        <img id="logo-away-v2" class="v2-logo" src="" alt="">
      </div>
    </div>
    <div class="timer-bar">
      <span id="timer-v2" class="time">00:00</span>
      <span id="period-v2" class="period">1 ТАЙМ</span>
    </div>
  </div>

  <!-- VARIANT 3: LAYERED STYLE -->
  <div id="scoreboard-v3" class="scoreboard-v3 hidden v3-theme-blue">
    <img id="logo-home-v3" class="v3-logo-home" src="" alt="">
    <img id="logo-away-v3" class="v3-logo-away" src="" alt="">
    <div class="dark-bar"></div>
    <span class="v3-team-name home" id="name-home-v3">ДОМ</span>
    <span class="v3-team-name away" id="name-away-v3">ГОСТИ</span>
    <div class="center-box">
      <div class="v3-scores">
        <span id="score-home-v3" class="v3-score">0</span>
        <span class="v3-score-separator">-</span>
        <span id="score-away-v3" class="v3-score">0</span>
      </div>
      <div class="timer-section">
        <span id="timer-v3" class="time">00:00</span>
        <span id="period-v3" class="period">1 ТАЙМ</span>
      </div>
    </div>
  </div>

  <div id="goal-animation" class="goal-animation">⚽ ГОЛ!</div>
  <img id="logo-goal-anim" class="logo-goal-anim" src="" alt="">

  <!-- ADMIN PANEL -->
  <div id="admin-panel" class="admin-panel hidden">
    <div class="admin-header">
      <h1>🏆 Scoreboard</h1>
      <p>Управление трансляцией</p>
    </div>
    <div class="admin-grid">
      <div class="admin-card">
        <h3>🎨 Дизайн плашки</h3>
        <div class="variant-selector">
          <button class="variant-btn active" onclick="setVariant(1)">В-1<small>Компакт</small></button>
          <button class="variant-btn" onclick="setVariant(2)">В-2<small>TV Style</small></button>
          <button class="variant-btn" onclick="setVariant(3)">В-3<small>Слои</small></button>
        </div>
        <div id="color-selector-container">
          <div class="color-selector">
            <button class="color-btn color-blue active" onclick="setColor('blue')">Синий</button>
            <button class="color-btn color-orange" onclick="setColor('orange')">Оранж</button>
            <button class="color-btn color-purple" onclick="setColor('purple')">Фиолет</button>
            <button class="color-btn color-silver" onclick="setColor('silver')">Серебро</button>
            <button class="color-btn color-red" onclick="setColor('red')">Красный</button>
            <button class="color-btn color-green" onclick="setColor('green')">Зелёный</button>
          </div>
        </div>
        <div class="checkbox-group" style="margin-top: 15px;" onclick="toggleLogoAnim()">
          <input type="checkbox" id="logo-anim-checkbox">
          <label for="logo-anim-checkbox">🎬 Анимация лого при голе (Дом)</label>
        </div>
      </div>
      <div class="admin-card">
        <h3>📋 Команды</h3>
        <div class="form-group"><label>Домашняя команда</label><input type="text" id="admin-name-home" placeholder="Название"></div>
        <div class="form-group"><label>Логотип (URL)</label><input type="text" id="admin-logo-home" placeholder="https://..."></div>
        <div class="form-group"><label>Гостевая команда</label><input type="text" id="admin-name-away" placeholder="Название"></div>
        <div class="form-group"><label>Логотип (URL)</label><input type="text" id="admin-logo-away" placeholder="https://..."></div>
        <button class="btn btn-primary" onclick="saveTeams()">💾 Сохранить</button>
      </div>
      <div class="admin-card">
        <h3>📊 Счёт</h3>
        <div class="score-inputs">
          <div class="form-group" style="flex:1"><label>Дом</label><input type="number" id="admin-score-home" value="0" min="0"></div>
          <div style="font-size: 26px; color: rgba(255,255,255,0.5); padding-top: 18px;">-</div>
          <div class="form-group" style="flex:1"><label>Гости</label><input type="number" id="admin-score-away" value="0" min="0"></div>
        </div>
        <div class="btn-group" style="margin-top: 12px;">
          <button class="btn btn-success" onclick="updateScore()">✅ Обновить</button>
          <button class="btn btn-warning" onclick="triggerGoal()">⚽ ГОЛ!</button>
          <button class="btn btn-danger" onclick="resetScore()">🔄 Сброс</button>
        </div>
      </div>
      <div class="admin-card">
        <h3>⏱️ Таймер</h3>
        <div class="timer-status">
          <span id="status-indicator" class="indicator"></span>
          <span id="status-text" class="text">Остановлен</span>
        </div>
        <div class="btn-group">
          <button class="btn btn-success" onclick="timerStart()">▶️ Старт</button>
          <button class="btn btn-warning" onclick="timerPause()">⏸️ Пауза</button>
          <button class="btn btn-danger" onclick="timerReset()">🔄 Сброс</button>
        </div>
      </div>
      <div class="admin-card">
        <h3>📍 Тайм</h3>
        <div class="form-group">
          <select id="admin-period">
            <option value="1 ТАЙМ">1 ТАЙМ</option>
            <option value="2 ТАЙМ">2 ТАЙМ</option>
            <option value="ПЕРЕРЫВ">ПЕРЕРЫВ</option>
            <option value="ДОП. ТАЙМ">ДОП. ТАЙМ</option>
            <option value="ПЕНАЛЬТИ">ПЕНАЛЬТИ</option>
          </select>
        </div>
        <button class="btn btn-primary" style="width: 100%;" onclick="updatePeriod()">✅ Обновить</button>
      </div>
      <div class="admin-card">
        <h3>⚡ Быстрые действия</h3>
        <div class="btn-group">
          <button class="btn btn-warning" onclick="quickGoal('home')">🏠 Гол Дом</button>
          <button class="btn btn-warning" onclick="quickGoal('away')">🏃 Гол Гости</button>
        </div>
      </div>
    </div>
  </div>
  <div id="toast" class="toast">✓ Сохранено!</div>

    storageBucket: "scoreboard-6d34c.firebasestorage.app",
    messagingSenderId: "11785107743",
    appId: "1:11785107743:web:a8faa98d6aaf4462dd582a"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const DB_KEY = 'match_data_v1';
  const ADMIN_MODE = new URLSearchParams(window.location.search).get('admin') === 'true';

  let state = {
    homeName: 'ДОМ', awayName: 'ГОСТИ', homeLogo: '', awayLogo: '',
    homeScore: 0, awayScore: 0, timerSeconds: 0, timerRunning: false, 
    period: '1 ТАЙМ', designVariant: 1, colorTheme: 'blue', logoAnimEnabled: false
  };

  let timerInterval = null;
  let localStartTime = null;

  const dataRef = ref(db, DB_KEY);
  onValue(dataRef, (snapshot) => {
    const data = snapshot.val();
    if (data) {
      const oldRunning = state.timerRunning;
      state = { ...state, ...data };
      if (!ADMIN_MODE) {
        if (state.timerRunning && !oldRunning) {
          localStartTime = Date.now() - (state.timerSeconds * 1000);
          startTimerInterval();
        }
        if (!state.timerRunning && oldRunning) stopTimerInterval();
        updateScoreboardDisplay();
        updateVariantVisibility();
        updateColorTheme();
        toggleColorSelector();
        updateLogoAnimCheckbox();
      } else {
        updateAdminDisplay();
      }
    }
  });

  onValue(ref(db, 'goal_trigger'), (snapshot) => {
    if (snapshot.val() && !ADMIN_MODE) {
      const data = snapshot.val();
      const goalAnim = document.getElementById('goal-animation');
      goalAnim.classList.add('animate');
      setTimeout(() => goalAnim.classList.remove('animate'), 1500);
      if (data.team === 'home' && state.logoAnimEnabled && state.homeLogo) {
        const logoAnim = document.getElementById('logo-goal-anim');
        logoAnim.src = state.homeLogo;
        logoAnim.classList.remove('animate');
        setTimeout(() => logoAnim.classList.add('animate'), 50);
        setTimeout(() => { logoAnim.classList.remove('animate'); logoAnim.src = ''; }, 1600);
      }
    }
  });

  function updateScoreboardDisplay() {
    ['v1','v2','v3'].forEach(v => {
      document.getElementById(`name-home-${v}`).textContent = state.homeName;
      document.getElementById(`name-away-${v}`).textContent = state.awayName;
      document.getElementById(`logo-home-${v}`).src = state.homeLogo || '';
      document.getElementById(`logo-away-${v}`).src = state.awayLogo || '';
      document.getElementById(`score-home-${v}`).textContent = state.homeScore;
      document.getElementById(`score-away-${v}`).textContent = state.awayScore;
      document.getElementById(`period-${v}`).textContent = state.period;
    });
    updateTimerDisplay();
  }

  function updateTimerDisplay() {
    const mins = Math.floor(state.timerSeconds / 60);
    const secs = state.timerSeconds % 60;
    const timeStr = String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
    ['v1','v2','v3'].forEach(v => document.getElementById(`timer-${v}`).textContent = timeStr);
    document.getElementById('timer-v1').classList.toggle('paused', !state.timerRunning);
  }

  function updateVariantVisibility() {
    document.getElementById('scoreboard-v1').classList.toggle('hidden', state.designVariant !== 1);
    document.getElementById('scoreboard-v2').classList.toggle('hidden', state.designVariant !== 2);
    document.getElementById('scoreboard-v3').classList.toggle('hidden', state.designVariant !== 3);
    toggleColorSelector();
  }

  function toggleColorSelector() {
    const container = document.getElementById('color-selector-container');
    if (container) container.style.display = state.designVariant === 3 ? 'block' : 'none';
  }

  function updateColorTheme() {
    const v3 = document.getElementById('scoreboard-v3');
    ['blue','orange','purple','silver','red','green'].forEach(c => v3.classList.remove('v3-theme-' + c));
    v3.classList.add('v3-theme-' + state.colorTheme);
  }

  function updateAdminDisplay() {
    document.getElementById('admin-name-home').value = state.homeName;
    document.getElementById('admin-name-away').value = state.awayName;
    document.getElementById('admin-logo-home').value = state.homeLogo;
    document.getElementById('admin-logo-away').value = state.awayLogo;
    document.getElementById('admin-score-home').value = state.homeScore;
    document.getElementById('admin-score-away').value = state.awayScore;
    document.getElementById('admin-period').value = state.period;
    document.getElementById('logo-anim-checkbox').checked = state.logoAnimEnabled;
    document.querySelectorAll('.variant-btn').forEach((btn, idx) => btn.classList.toggle('active', idx + 1 === state.designVariant));
    document.querySelectorAll('.color-btn').forEach(btn => btn.classList.toggle('active', btn.classList.contains('color-' + state.colorTheme)));
    toggleColorSelector();
    const indicator = document.getElementById('status-indicator');
    const text = document.getElementById('status-text');
    if (state.timerRunning) { indicator.classList.add('running'); text.textContent = 'Запущен'; }
    else { indicator.classList.remove('running'); text.textContent = 'Остановлен'; }
  }

  function updateLogoAnimCheckbox() {
    const checkbox = document.getElementById('logo-anim-checkbox');
    if (checkbox) checkbox.checked = state.logoAnimEnabled;
  }

  function startTimer() { state.timerRunning = true; update(ref(db, DB_KEY), { timerRunning: true }); showToast(); }
  function pauseTimer() { state.timerRunning = false; update(ref(db, DB_KEY), { timerRunning: false }); showToast(); }
  function timerReset() { state.timerRunning = false; state.timerSeconds = 0; update(ref(db, DB_KEY), { timerRunning: false, timerSeconds: 0 }); showToast(); }

  function startTimerInterval() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      state.timerSeconds = Math.floor((Date.now() - localStartTime) / 1000);
      updateTimerDisplay();
      if (state.timerSeconds % 5 === 0) update(ref(db, DB_KEY), { timerSeconds: state.timerSeconds });
    }, 1000);
  }

  function stopTimerInterval() { if (timerInterval) clearInterval(timerInterval); timerInterval = null; }

  window.setVariant = (v) => { state.designVariant = v; update(ref(db, DB_KEY), { designVariant: v }); showToast(); };
  window.setColor = (c) => { state.colorTheme = c; update(ref(db, DB_KEY), { colorTheme: c }); showToast(); };
  window.toggleLogoAnim = () => { setTimeout(() => { state.logoAnimEnabled = document.getElementById('logo-anim-checkbox').checked; update(ref(db, DB_KEY), { logoAnimEnabled: state.logoAnimEnabled }); showToast(); }, 50); };
  window.saveTeams = () => { state.homeName = document.getElementById('admin-name-home').value || 'ДОМ'; state.awayName = document.getElementById('admin-name-away').value || 'ГОСТИ'; state.homeLogo = document.getElementById('admin-logo-home').value; state.awayLogo = document.getElementById('admin-logo-away').value; update(ref(db, DB_KEY), state); showToast(); };
  window.updateScore = () => { state.homeScore = parseInt(document.getElementById('admin-score-home').value) || 0; state.awayScore = parseInt(document.getElementById('admin-score-away').value) || 0; update(ref(db, DB_KEY), state); showToast(); };
  window.resetScore = () => { state.homeScore = 0; state.awayScore = 0; document.getElementById('admin-score-home').value = 0; document.getElementById('admin-score-away').value = 0; update(ref(db, DB_KEY), state); showToast(); };
  window.triggerGoal = () => { set(ref(db, 'goal_trigger'), { time: Date.now(), team: 'none' }); setTimeout(() => set(ref(db, 'goal_trigger'), null), 2000); };
  window.quickGoal = (team) => { if (team === 'home') { state.homeScore++; document.getElementById('admin-score-home').value = state.homeScore; } else { state.awayScore++; document.getElementById('admin-score-away').value = state.awayScore; } update(ref(db, DB_KEY), state); set(ref(db, 'goal_trigger'), { time: Date.now(), team: team }); setTimeout(() => set(ref(db, 'goal_trigger'), null), 2000); showToast(); };
  window.timerStart = () => { startTimer(); };
  window.timerPause = () => { pauseTimer(); };
  window.timerReset = () => { timerReset(); };
  window.updatePeriod = () => { state.period = document.getElementById('admin-period').value; if (state.period === 'ПЕРЕРЫВ' && state.timerRunning) pauseTimer(); update(ref(db, DB_KEY), state); showToast(); };
  function showToast() { const t = document.getElementById('toast'); t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }

  if (ADMIN_MODE) {
    ['v1','v2','v3'].forEach(v => document.getElementById('scoreboard-' + v).classList.add('hidden'));
    document.getElementById('admin-panel').classList.remove('hidden');
    updateAdminDisplay();
  } else {
    updateScoreboardDisplay();
    updateVariantVisibility();
    updateColorTheme();
    if (state.timerRunning) { localStartTime = Date.now() - (state.timerSeconds * 1000); startTimerInterval(); }
  }
</script>
</body>
</html>
