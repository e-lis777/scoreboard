<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Scoreboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Arial Black', Arial, sans-serif; background: transparent; overflow: hidden; user-select: none; }
  
  /* === VARIANT 1: GRADIENT === */
  .scoreboard-v1 {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; max-width: 900px; margin: 0 auto; padding: 15px 25px;
    background: linear-gradient(180deg, rgba(15, 15, 25, 0.98) 0%, rgba(30, 30, 45, 0.95) 50%, rgba(15, 15, 25, 0.98) 100%);
    border-radius: 16px; border: 2px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), 0 0 60px rgba(0, 120, 255, 0.25);
    backdrop-filter: blur(10px);
  }
  
  /* === VARIANT 2: TV STYLE (ИСПРАВЛЕННЫЙ) === */
  .scoreboard-v2 {
    display: flex;
    align-items: center;
    width: 100%;
    max-width: 850px;
    margin: 0 auto;
    transform: skewX(-8deg);
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
    overflow: hidden;
  }

  .scoreboard-v2 .team-section {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 12px 20px;
    flex: 1;
  }

  .scoreboard-v2 .team-home {
    background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
    border-right: 2px solid #c00;
  }

  .scoreboard-v2 .team-away {
    background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
    border-left: 2px solid #c00;
  }

  .scoreboard-v2 .score-section {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    background: linear-gradient(135deg, #e0e0e0 0%, #ffffff 50%, #e0e0e0 100%);
    padding: 12px 25px;
    min-width: 140px;
  }

  .scoreboard-v2 .team-name {
    font-size: 22px;
    font-weight: 900;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 1px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.8);
  }

  .scoreboard-v2 .score {
    font-size: 42px;
    font-weight: 900;
    color: #000;
    text-shadow: 0 2px 4px rgba(255,255,255,0.5);
  }

  .scoreboard-v2 .score-separator {
    font-size: 32px;
    color: #333;
    font-weight: 900;
  }

  .scoreboard-v2 .logo {
    width: 40px;
    height: 40px;
    object-fit: contain;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
  }

  .scoreboard-v2 .timer-bar {
    position: absolute;
    bottom: -32px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(90deg, #1a1a1a 0%, #2d2d2d 100%);
    padding: 6px 20px;
    border-top: 2px solid #c00;
    border-bottom: 2px solid #c00;
    display: flex;
    align-items: center;
    gap: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  }

  .scoreboard-v2 .timer-bar .time {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    font-variant-numeric: tabular-nums;
  }

  .scoreboard-v2 .timer-bar .period {
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    text-transform: uppercase;
  }

  /* === VARIANT 3: IMAGE STYLE (НОВЫЙ) === */
  .scoreboard-v3 {
    display: flex;
    align-items: stretch;
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
    border-radius: 8px;
    overflow: hidden;
  }

  .scoreboard-v3 .team-section {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 14px 25px;
    flex: 1;
    position: relative;
  }

  .scoreboard-v3 .team-section::after {
    content: '';
    position: absolute;
    top: 0;
    bottom: 0;
    width: 30px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1));
  }

  .scoreboard-v3 .team-home::after { right: 0; }
  .scoreboard-v3 .team-away::after { left: 0; }

  .scoreboard-v3 .score-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 30px;
    min-width: 160px;
    position: relative;
  }

  .scoreboard-v3 .score-section::before {
    content: '';
    position: absolute;
    top: 0;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 50%, rgba(0,0,0,0.1) 100%);
  }

  .scoreboard-v3 .scores {
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 1;
  }

  .scoreboard-v3 .team-name {
    font-size: 20px;
    font-weight: 900;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 1px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    z-index: 1;
  }

  .scoreboard-v3 .score {
    font-size: 48px;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 3px 6px rgba(0,0,0,0.5);
  }

  .scoreboard-v3 .score-separator {
    font-size: 32px;
    color: rgba(255,255,255,0.7);
    font-weight: 900;
  }

  .scoreboard-v3 .logo {
    width: 45px;
    height: 45px;
    object-fit: contain;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    z-index: 1;
  }

  .scoreboard-v3 .timer-section {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    padding: 8px 20px;
    background: rgba(0,0,0,0.3);
    margin-top: 5px;
    border-radius: 6px;
    z-index: 1;
  }

  .scoreboard-v3 .timer-section .time {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    font-variant-numeric: tabular-nums;
  }

  .scoreboard-v3 .timer-section .period {
    font-size: 16px;
    font-weight: 700;
    color: rgba(255,255,255,0.8);
    text-transform: uppercase;
  }

  /* === COLOR THEMES for Variant 3 === */
  .v3-theme-blue .team-home, .v3-theme-blue .team-away {
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
  }
  .v3-theme-blue .score-section {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #1a1a2e 100%);
  }

  .v3-theme-orange .team-home, .v3-theme-orange .team-away {
    background: linear-gradient(135deg, #d35400 0%, #e67e22 100%);
  }
  .v3-theme-orange .score-section {
    background: linear-gradient(135deg, #1a1a1a 0%, #2c1810 50%, #1a1a1a 100%);
  }

  .v3-theme-purple .team-home, .v3-theme-purple .team-away {
    background: linear-gradient(135deg, #4a148c 0%, #7b1fa2 100%);
  }
  .v3-theme-purple .score-section {
    background: linear-gradient(135deg, #1a1a2e 0%, #2d1b4e 50%, #1a1a2e 100%);
  }

  .v3-theme-silver .team-home, .v3-theme-silver .team-away {
    background: linear-gradient(135deg, #424242 0%, #616161 100%);
  }
  .v3-theme-silver .score-section {
    background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 50%, #1a1a1a 100%);
  }

  .v3-theme-red .team-home, .v3-theme-red .team-away {
    background: linear-gradient(135deg, #8b0000 0%, #c41e3a 100%);
  }
  .v3-theme-red .score-section {
    background: linear-gradient(135deg, #1a1a1a 0%, #2d1010 50%, #1a1a1a 100%);
  }

  .v3-theme-green .team-home, .v3-theme-green .team-away {
    background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 100%);
  }
  .v3-theme-green .score-section {
    background: linear-gradient(135deg, #1a1a2e 0%, #1b2e1a 50%, #1a1a2e 100%);
  }

  /* === ОБЩИЕ СТИЛИ === */
  .team { display: flex; align-items: center; gap: 12px; flex: 1; }
  .team.right { justify-content: flex-end; flex-direction: row-reverse; }
  .logo { width: 60px; height: 60px; object-fit: contain; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5)); }
  .team-name { font-size: 20px; font-weight: 900; color: #fff; text-transform: uppercase; text-shadow: 0 2px 4px rgba(0,0,0,0.8); letter-spacing: 1px; }
  .score-container { display: flex; align-items: center; gap: 15px; padding: 0 30px; }
  .score { font-size: 48px; font-weight: 900; color: #fff; text-shadow: 0 0 20px rgba(0, 150, 255, 0.8); min-width: 50px; text-align: center; }
  .score-separator { font-size: 32px; color: rgba(255,255,255,0.4); }

  .timer-section-v1 {
    position: absolute; bottom: -45px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 15px;
    background: linear-gradient(180deg, rgba(255, 80, 80, 0.95), rgba(200, 40, 40, 0.95));
    padding: 8px 20px; border-radius: 20px; border: 2px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 4px 20px rgba(255, 50, 50, 0.4);
  }

  .period-badge { font-size: 14px; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 1px; padding: 4px 12px; background: rgba(0,0,0,0.3); border-radius: 10px; }
  .timer { font-size: 22px; font-weight: 900; color: #fff; font-variant-numeric: tabular-nums; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
  .timer.paused { animation: pulse 1s infinite; color: #ffcc00; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

  .goal-animation {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
    font-size: 120px; font-weight: 900; color: #ffd700;
    text-shadow: 0 0 30px rgba(255, 215, 0, 0.8); z-index: 1000; pointer-events: none;
  }
  .goal-animation.animate { animation: goalPop 1.5s ease-out; }
  @keyframes goalPop {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
  }

  .admin-panel {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    padding: 30px; overflow-y: auto; z-index: 2000; color: #fff;
  }
  .admin-header { text-align: center; margin-bottom: 30px; }
  .admin-header h1 { color: #00d4ff; font-size: 32px; text-transform: uppercase; letter-spacing: 2px; }
  .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; }
  .admin-card { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); }
  .admin-card h3 { color: #00d4ff; font-size: 18px; margin-bottom: 20px; text-transform: uppercase; }
  .form-group { margin-bottom: 15px; }
  .form-group label { display: block; color: rgba(255,255,255,0.7); font-size: 13px; margin-bottom: 8px; text-transform: uppercase; }
  .form-group input, .form-group select { width: 100%; padding: 12px 15px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: #fff; font-size: 16px; }
  .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn { padding: 12px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; text-transform: uppercase; cursor: pointer; font-family: inherit; }
  .btn-primary { background: linear-gradient(135deg, #00d4ff, #0099cc); color: #fff; }
  .btn-success { background: linear-gradient(135deg, #2ed573, #1ea65a); color: #fff; }
  .btn-warning { background: linear-gradient(135deg, #ffa502, #cc8400); color: #fff; }
  .btn-danger { background: linear-gradient(135deg, #ff4757, #cc3344); color: #fff; }
  .score-inputs { display: flex; gap: 15px; align-items: center; }
  .score-inputs input { width: 80px; text-align: center; font-size: 24px; font-weight: 900; }
  .hidden { display: none; }
  .toast { position: fixed; bottom: 30px; right: 30px; background: linear-gradient(135deg, #2ed573, #1ea65a); color: #fff; padding: 15px 25px; border-radius: 10px; font-weight: 700; box-shadow: 0 5px 20px rgba(0,0,0,0.3); transform: translateY(100px); opacity: 0; transition: all 0.3s ease; z-index: 3000; }
  .toast.show { transform: translateY(0); opacity: 1; }

  .variant-selector { display: flex; gap: 10px; margin-bottom: 20px; }
  .variant-btn { flex: 1; padding: 15px; border: 2px solid rgba(255,255,255,0.2); border-radius: 10px; background: rgba(0,0,0,0.3); color: #fff; font-weight: 700; cursor: pointer; transition: all 0.3s; }
  .variant-btn.active { border-color: #00d4ff; background: rgba(0, 212, 255, 0.2); }

  .color-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
  .color-btn {
    padding: 12px;
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    cursor: pointer;
    font-weight: 700;
    color: #fff;
    text-transform: uppercase;
    font-size: 12px;
    transition: all 0.3s;
  }
  .color-btn.active { border-color: #fff; transform: scale(1.05); }
  .color-blue { background: linear-gradient(135deg, #1e3c72, #2a5298); }
  .color-orange { background: linear-gradient(135deg, #d35400, #e67e22); }
  .color-purple { background: linear-gradient(135deg, #4a148c, #7b1fa2); }
  .color-silver { background: linear-gradient(135deg, #424242, #616161); }
  .color-red { background: linear-gradient(135deg, #8b0000, #c41e3a); }
  .color-green { background: linear-gradient(135deg, #1b5e20, #2e7d32); }
</style>
</head>
<body>

  <!-- === VARIANT 1: GRADIENT === -->
  <div id="scoreboard-v1" class="scoreboard-v1">
    <div class="team left">
      <img id="logo-home-v1" class="logo" src="" alt="">
      <span id="name-home-v1" class="team-name">ДОМ</span>
    </div>
    <div class="score-container">
      <span id="score-home-v1" class="score">0</span>
      <span class="score-separator">:</span>
      <span id="score-away-v1" class="score">0</span>
    </div>
    <div class="team right">
      <span id="name-away-v1" class="team-name">ГОСТИ</span>
      <img id="logo-away-v1" class="logo" src="" alt="">
    </div>
    <div class="timer-section-v1">
      <span id="period-badge-v1" class="period-badge">1 ТАЙМ</span>
      <span id="timer-v1" class="timer">00:00</span>
    </div>
  </div>

  <!-- === VARIANT 2: TV STYLE (ИСПРАВЛЕННЫЙ) === -->
  <div id="scoreboard-v2" class="scoreboard-v2 hidden">
    <div class="team-section team-home">
      <img id="logo-home-v2" class="logo" src="" alt="">
      <span id="name-home-v2" class="team-name">ДОМ</span>
    </div>
    <div class="score-section">
      <span id="score-home-v2" class="score">0</span>
      <span class="score-separator">-</span>
      <span id="score-away-v2" class="score">0</span>
    </div>
    <div class="team-section team-away">
      <span id="name-away-v2" class="team-name">ГОСТИ</span>
      <img id="logo-away-v2" class="logo" src="" alt="">
    </div>
    <div class="timer-bar">
      <span id="timer-v2" class="time">00:00</span>
      <span id="period-v2" class="period">1 ТАЙМ</span>
    </div>
  </div>

  <!-- === VARIANT 3: IMAGE STYLE (НОВЫЙ) === -->
  <div id="scoreboard-v3" class="scoreboard-v3 hidden v3-theme-blue">
    <div class="team-section team-home">
      <img id="logo-home-v3" class="logo" src="" alt="">
      <span id="name-home-v3" class="team-name">ДОМ</span>
    </div>
    <div class="score-section">
      <div class="scores">
        <span id="score-home-v3" class="score">0</span>
        <span class="score-separator">-</span>
        <span id="score-away-v3" class="score">0</span>
      </div>
      <div class="timer-section">
        <span id="timer-v3" class="time">00:00</span>
        <span id="period-v3" class="period">1 ТАЙМ</span>
      </div>
    </div>
    <div class="team-section team-away">
      <span id="name-away-v3" class="team-name">ГОСТИ</span>
      <img id="logo-away-v3" class="logo" src="" alt="">
    </div>
  </div>

  <div id="goal-animation" class="goal-animation">⚽ ГОЛ!</div>

  <!-- === ADMIN PANEL === -->
  <div id="admin-panel" class="admin-panel hidden">
    <div class="admin-header">
      <h1>🏆 Scoreboard Admin</h1>
      <p>Управление трансляцией</p>
    </div>
    <div class="admin-grid">
      
      <!-- Выбор варианта дизайна -->
      <div class="admin-card">
        <h3>🎨 Дизайн плашки</h3>
        <div class="variant-selector">
          <button class="variant-btn active" onclick="setVariant(1)">Вариант 1<br><small>Градиент</small></button>
          <button class="variant-btn" onclick="setVariant(2)">Вариант 2<br><small>TV Style</small></button>
          <button class="variant-btn" onclick="setVariant(3)">Вариант 3<br><small>Image Style</small></button>
        </div>
      </div>

      <!-- Выбор цвета для Variant 3 -->
      <div class="admin-card">
        <h3>🌈 Цвет (Вариант 3)</h3>
        <div class="color-selector">
          <button class="color-btn color-blue active" onclick="setColor('blue')">Синий</button>
          <button class="color-btn color-orange" onclick="setColor('orange')">Оранж</button>
          <button class="color-btn color-purple" onclick="setColor('purple')">Фиолет</button>
          <button class="color-btn color-silver" onclick="setColor('silver')">Серебро</button>
          <button class="color-btn color-red" onclick="setColor('red')">Красный</button>
          <button class="color-btn color-green" onclick="setColor('green')">Зелёный</button>
        </div>
      </div>

      <div class="admin-card">
        <h3>📋 Команды</h3>
        <div class="form-group"><label>Домашняя команда</label><input type="text" id="admin-name-home"></div>
        <div class="form-group"><label>Логотип (URL)</label><input type="text" id="admin-logo-home"></div>
        <div class="form-group"><label>Гостевая команда</label><input type="text" id="admin-name-away"></div>
        <div class="form-group"><label>Логотип (URL)</label><input type="text" id="admin-logo-away"></div>
        <button class="btn btn-primary" onclick="saveTeams()">💾 Сохранить</button>
      </div>

      <div class="admin-card">
        <h3>📊 Счёт</h3>
        <div class="score-inputs">
          <div class="form-group" style="flex:1"><label>Дом</label><input type="number" id="admin-score-home" value="0" min="0"></div>
          <div style="font-size: 32px; color: rgba(255,255,255,0.5);">-</div>
          <div class="form-group" style="flex:1"><label>Гости</label><input type="number" id="admin-score-away" value="0" min="0"></div>
        </div>
        <div class="btn-group" style="margin-top: 15px;">
          <button class="btn btn-success" onclick="updateScore()">✅ Обновить</button>
          <button class="btn btn-warning" onclick="triggerGoal()">⚽ ГОЛ!</button>
          <button class="btn btn-danger" onclick="resetScore()">🔄 Сброс</button>
        </div>
      </div>

      <div class="admin-card">
        <h3>⏱️ Таймер</h3>
        <div class="form-group">
          <label>Статус</label>
          <div style="padding: 12px; background: rgba(0,0,0,0.3); border-radius: 8px;">
            <span id="status-indicator" style="display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:8px;background:#ffa502;"></span>
            <span id="status-text">Остановлен</span>
          </div>
        </div>
        <div class="btn-group">
          <button class="btn btn-success" style="flex:1" onclick="timerControl('start')">▶️ Старт</button>
          <button class="btn btn-warning" style="flex:1" onclick="timerControl('pause')">⏸️ Пауза</button>
          <button class="btn btn-danger" style="flex:1" onclick="timerControl('reset')">🔄 Сброс</button>
        </div>
      </div>

      <div class="admin-card">
        <h3>📍 Тайм</h3>
        <div class="form-group">
          <select id="admin-period">
            <option value="1 ТАЙМ">1 ТАЙМ</option>
            <option value="2 ТАЙМ">2 ТАЙМ</option>
            <option value="ПЕРЕРЫВ">ПЕРЕРЫВ</option>
            <option value="ДОП. ТАЙМ">ДОП. ТАЙМ</option>
            <option value="ПЕНАЛЬТИ">ПЕНАЛЬТИ</option>
          </select>
        </div>
        <button class="btn btn-primary" style="width: 100%;" onclick="updatePeriod()">✅ Обновить</button>
      </div>

      <div class="admin-card">
        <h3>⚡ Быстрые действия</h3>
        <div class="btn-group">
          <button class="btn btn-warning" onclick="quickGoal('home')">🏠 Гол Дом</button>
          <button class="btn btn-warning" onclick="quickGoal('away')">🏃 Гол Гости</button>
        </div>
      </div>
    </div>
  </div>
  <div id="toast" class="toast">✓ Сохранено!</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAFb-yJaI7WJFcTx_wAFmSngupHqUNai1I",
    authDomain: "scoreboard-6d34c.firebaseapp.com",
    databaseURL: "https://scoreboard-6d34c-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "scoreboard-6d34c",
    storageBucket: "scoreboard-6d34c.firebasestorage.app",
    messagingSenderId: "11785107743",
    appId: "1:11785107743:web:a8faa98d6aaf4462dd582a"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const DB_KEY = 'match_data_v1';
  const ADMIN_MODE = new URLSearchParams(window.location.search).get('admin') === 'true';

  let state = {
    homeName: 'ДОМ', awayName: 'ГОСТИ', homeLogo: '', awayLogo: '',
    homeScore: 0, awayScore: 0, timerSeconds: 0, timerRunning: false, 
    period: '1 ТАЙМ', designVariant: 3, colorTheme: 'blue'
  };

  let timerInterval = null;
  let localStartTime = null;

  const dataRef = ref(db, DB_KEY);
  onValue(dataRef, (snapshot) => {
    const data = snapshot.val();
    if (data) {
      const oldRunning = state.timerRunning;
      state = { ...state, ...data };
      
      if (!ADMIN_MODE) {
        if (state.timerRunning && !oldRunning) {
          localStartTime = Date.now() - (state.timerSeconds * 1000);
          startTimer();
        }
        if (!state.timerRunning && oldRunning) { stopTimer(); }
        updateScoreboardDisplay();
        updateVariantVisibility();
        updateColorTheme();
      } else {
        updateAdminDisplay();
      }
    }
  });

  onValue(ref(db, 'goal_trigger'), (snapshot) => {
    if (snapshot.val() && !ADMIN_MODE) {
      const anim = document.getElementById('goal-animation');
      anim.classList.add('animate');
      setTimeout(() => anim.classList.remove('animate'), 1500);
    }
  });

  function updateScoreboardDisplay() {
    // Variant 1
    document.getElementById('name-home-v1').textContent = state.homeName;
    document.getElementById('name-away-v1').textContent = state.awayName;
    document.getElementById('logo-home-v1').src = state.homeLogo || '';
    document.getElementById('logo-away-v1').src = state.awayLogo || '';
    document.getElementById('score-home-v1').textContent = state.homeScore;
    document.getElementById('score-away-v1').textContent = state.awayScore;
    document.getElementById('period-badge-v1').textContent = state.period;
    
    // Variant 2
    document.getElementById('name-home-v2').textContent = state.homeName;
    document.getElementById('name-away-v2').textContent = state.awayName;
    document.getElementById('logo-home-v2').src = state.homeLogo || '';
    document.getElementById('logo-away-v2').src = state.awayLogo || '';
    document.getElementById('score-home-v2').textContent = state.homeScore;
    document.getElementById('score-away-v2').textContent = state.awayScore;
    document.getElementById('period-v2').textContent = state.period;
    
    // Variant 3
    document.getElementById('name-home-v3').textContent = state.homeName;
    document.getElementById('name-away-v3').textContent = state.awayName;
    document.getElementById('logo-home-v3').src = state.homeLogo || '';
    document.getElementById('logo-away-v3').src = state.awayLogo || '';
    document.getElementById('score-home-v3').textContent = state.homeScore;
    document.getElementById('score-away-v3').textContent = state.awayScore;
    document.getElementById('period-v3').textContent = state.period;
    
    updateTimerDisplay();
  }

  function updateTimerDisplay() {
    const mins = Math.floor(state.timerSeconds / 60);
    const secs = state.timerSeconds % 60;
    const timeStr = String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
    
    document.getElementById('timer-v1').textContent = timeStr;
    document.getElementById('timer-v2').textContent = timeStr;
    document.getElementById('timer-v3').textContent = timeStr;
    
    document.getElementById('timer-v1').classList.toggle('paused', !state.timerRunning);
  }

  function updateVariantVisibility() {
    document.getElementById('scoreboard-v1').classList.toggle('hidden', state.designVariant !== 1);
    document.getElementById('scoreboard-v2').classList.toggle('hidden', state.designVariant !== 2);
    document.getElementById('scoreboard-v3').classList.toggle('hidden', state.designVariant !== 3);
  }

  function updateColorTheme() {
    const v3 = document.getElementById('scoreboard-v3');
    v3.classList.remove('v3-theme-blue', 'v3-theme-orange', 'v3-theme-purple', 'v3-theme-silver', 'v3-theme-red', 'v3-theme-green');
    v3.classList.add('v3-theme-' + state.colorTheme);
  }

  function updateAdminDisplay() {
    document.getElementById('admin-name-home').value = state.homeName;
    document.getElementById('admin-name-away').value = state.awayName;
    document.getElementById('admin-logo-home').value = state.homeLogo;
    document.getElementById('admin-logo-away').value = state.awayLogo;
    document.getElementById('admin-score-home').value = state.homeScore;
    document.getElementById('admin-score-away').value = state.awayScore;
    document.getElementById('admin-period').value = state.period;
    
    document.querySelectorAll('.variant-btn').forEach((btn, idx) => {
      btn.classList.toggle('active', idx + 1 === state.designVariant);
    });

    document.querySelectorAll('.color-btn').forEach((btn) => {
      btn.classList.toggle('active', btn.classList.contains('color-' + state.colorTheme));
    });
    
    const indicator = document.getElementById('status-indicator');
    const text = document.getElementById('status-text');
    if (state.timerRunning) {
      indicator.style.background = '#2ed573';
      indicator.style.boxShadow = '0 0 10px #2ed573';
      text.textContent = 'Запущен';
    } else {
      indicator.style.background = '#ffa502';
      text.textContent = 'Остановлен';
    }
  }

  function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      state.timerSeconds = Math.floor((Date.now() - localStartTime) / 1000);
      updateTimerDisplay();
      if (state.timerSeconds % 5 === 0) {
        update(ref(db, DB_KEY), { timerSeconds: state.timerSeconds });
      }
    }, 1000);
  }

  function stopTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = null;
  }

  window.setVariant = (variant) => {
    state.designVariant = variant;
    update(ref(db, DB_KEY), { designVariant: variant });
    showToast();
  };

  window.setColor = (color) => {
    state.colorTheme = color;
    update(ref(db, DB_KEY), { colorTheme: color });
    showToast();
  };

  window.saveTeams = () => {
    state.homeName = document.getElementById('admin-name-home').value || 'ДОМ';
    state.awayName = document.getElementById('admin-name-away').value || 'ГОСТИ';
    state.homeLogo = document.getElementById('admin-logo-home').value;
    state.awayLogo = document.getElementById('admin-logo-away').value;
    update(ref(db, DB_KEY), state);
    showToast();
  };

  window.updateScore = () => {
    state.homeScore = parseInt(document.getElementById('admin-score-home').value) || 0;
    state.awayScore = parseInt(document.getElementById('admin-score-away').value) || 0;
    update(ref(db, DB_KEY), state);
    showToast();
  };

  window.resetScore = () => {
    state.homeScore = 0; state.awayScore = 0;
    document.getElementById('admin-score-home').value = 0;
    document.getElementById('admin-score-away').value = 0;
    update(ref(db, DB_KEY), state);
    showToast();
  };

  window.triggerGoal = () => {
    set(ref(db, 'goal_trigger'), Date.now());
    setTimeout(() => set(ref(db, 'goal_trigger'), null), 2000);
  };

  window.quickGoal = (team) => {
    if (team === 'home') { state.homeScore++; document.getElementById('admin-score-home').value = state.homeScore; }
    else { state.awayScore++; document.getElementById('admin-score-away').value = state.awayScore; }
    update(ref(db, DB_KEY), state);
    triggerGoal();
    showToast();
  };

  window.timerControl = (action) => {
    if (action === 'start') {
      state.timerRunning = true;
      update(ref(db, DB_KEY), { timerRunning: true });
    } else if (action === 'pause') {
      state.timerRunning = false;
      update(ref(db, DB_KEY), { timerRunning: false });
    } else if (action === 'reset') {
      state.timerRunning = false;
      state.timerSeconds = 0;
      update(ref(db, DB_KEY), { timerRunning: false, timerSeconds: 0 });
    }
    showToast();
  };

  window.updatePeriod = () => {
    state.period = document.getElementById('admin-period').value;
    update(ref(db, DB_KEY), state);
    showToast();
  };

  function showToast() {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  if (ADMIN_MODE) {
    document.getElementById('scoreboard-v1').classList.add('hidden');
    document.getElementById('scoreboard-v2').classList.add('hidden');
    document.getElementById('scoreboard-v3').classList.add('hidden');
    document.getElementById('admin-panel').classList.remove('hidden');
    updateAdminDisplay();
  } else {
    updateScoreboardDisplay();
    updateVariantVisibility();
    updateColorTheme();
    if (state.timerRunning) {
      localStartTime = Date.now() - (state.timerSeconds * 1000);
      startTimer();
    }
  }
</script>
</body>
</html>
